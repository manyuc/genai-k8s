apiVersion: batch/v1
kind: Job
metadata:
  name: genai-api-load-generator
  namespace: genai-staging
spec:
  backoffLimit: 0
  parallelism: 5
  completions: 5
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: curl
          image: curlimages/curl:8.7.1
          command:
            - /bin/sh
            - -c
            - |
              for i in $(seq 1 60); do
                curl -s -X POST http://genai-genai-platform-api.genai-staging.svc.cluster.local:8000/generate \
                  -H "Content-Type: application/json" \
                  -d '{"product":"Latency stress test","audience":"platform team"}' > /dev/null
              done
