# The API stays internal to the cluster because the UI proxies requests to it.
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: genai
  labels:
    app: api
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: api
    tier: backend
  ports:
    - name: http
      port: 8000
      targetPort: http
