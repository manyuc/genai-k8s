# The Ollama API is only needed inside the cluster, so ClusterIP is enough.
apiVersion: v1
kind: Service
metadata:
  name: llm-service
  namespace: genai
  labels:
    app: llm
    tier: model
spec:
  type: ClusterIP
  selector:
    app: llm
    tier: model
  ports:
    - name: http
      port: 11434
      targetPort: http
