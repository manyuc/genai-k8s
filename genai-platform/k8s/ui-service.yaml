# The UI is exposed as a NodePort so it is easy to access in a local KIND workshop.
apiVersion: v1
kind: Service
metadata:
  name: ui-service
  namespace: genai
  labels:
    app: ui
    tier: frontend
spec:
  type: NodePort
  selector:
    app: ui
    tier: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30080
