{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "genai-platform.componentName" (dict "root" . "component" "ingress") }}
  namespace: {{ include "genai-platform.namespace" . }}
  labels:
    {{- include "genai-platform.labels" . | nindent 4 }}
    {{- include "genai-platform.componentLabels" (dict "root" . "component" "ui") | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: {{ .Values.ingress.pathType }}
            backend:
              service:
                name: {{ include "genai-platform.componentName" (dict "root" . "component" "ui") }}
                port:
                  number: {{ .Values.ui.service.port }}
{{- end }}
