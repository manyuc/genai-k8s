apiVersion: v1
kind: Service
metadata:
  name: {{ include "genai-platform.componentName" (dict "root" . "component" "ui") }}
  namespace: {{ include "genai-platform.namespace" . }}
  labels:
    {{- include "genai-platform.labels" . | nindent 4 }}
    {{- include "genai-platform.componentLabels" (dict "root" . "component" "ui") | nindent 4 }}
spec:
  type: {{ .Values.ui.service.type }}
  selector:
    {{- include "genai-platform.componentLabels" (dict "root" . "component" "ui") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.ui.service.port }}
      targetPort: http
      {{- if and (eq .Values.ui.service.type "NodePort") .Values.ui.service.nodePort }}
      nodePort: {{ .Values.ui.service.nodePort }}
      {{- end }}
